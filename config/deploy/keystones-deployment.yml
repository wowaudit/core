apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystones-deployment
  labels:
    app: keystones
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keystones
  template:
    metadata:
      labels:
        app: keystones
        metrics: wowaudit-scraper
    spec:
      containers:
        - name: keystones
          image: shedi/wowaudit:latest
          command: ["/srv/bin/refresh"]
          args: ["keystones"]

          ports:
            - name: metrics
              containerPort: 9394

          resources:
            requests:
              cpu: 500m
              memory: 400Mi

            limits:
              memory: 2000Mi

      imagePullSecrets:
        - name: regcred
