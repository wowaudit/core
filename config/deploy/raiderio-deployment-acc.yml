apiVersion: apps/v1
kind: Deployment
metadata:
  name: raiderio-deployment-acc
  labels:
    app: raiderio-acc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raiderio-acc
  template:
    metadata:
      labels:
        app: raiderio-acc
        metrics: wowaudit-scraper
    spec:
      tolerations:
        - key: low-performance-node
          operator: Exists
          effect: NoSchedule
      containers:
        - name: raiderio-acc
          image: shedi/wowaudit-acc:latest
          command: ["/srv/bin/refresh"]
          args: ["raiderio"]

          ports:
            - name: metrics
              containerPort: 9394

          resources:
            requests:
              cpu: 50m
              memory: 250Mi

            limits:
              memory: 500Mi

      imagePullSecrets:
        - name: regcred
