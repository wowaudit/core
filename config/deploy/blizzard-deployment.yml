apiVersion: apps/v1
kind: Deployment
metadata:
  name: blizzard-deployment
  labels:
    app: blizzard
spec:
  replicas: 9
  selector:
    matchLabels:
      app: blizzard
  template:
    metadata:
      labels:
        app: blizzard
        metrics: wowaudit-legacy-scraper
    spec:
      containers:
        - name: blizzard
          image: shedi/wowaudit:latest
          command: ["/srv/bin/refresh"]
          args: ["blizzard"]

          ports:
            - name: metrics
              containerPort: 9394

          resources:
            requests:
              cpu: 250m
              memory: 350Mi

            limits:
              cpu: 250m
              memory: 600Mi

      imagePullSecrets:
        - name: regcred
