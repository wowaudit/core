apiVersion: v1
kind: Service
metadata:
  name: legacy-scraper-metrics
  labels:
    app: wowaudit-legacy-scraper-metrics
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9394
      targetPort: metrics
  selector:
    metrics: wowaudit-legacy-scraper
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wowaudit-legacy-scraper-metrics
  labels:
    app: wowaudit-legacy-scraper-metrics
spec:
  selector:
    matchLabels:
      app: wowaudit-legacy-scraper-metrics
  endpoints:
    - port: metrics
      path: /metrics
